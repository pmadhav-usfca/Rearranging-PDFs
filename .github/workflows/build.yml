name: Build and Release PDF Manager

on:
  push:
    tags:
      - 'v*' # Triggers only when you push a tag like v1.0, v1.1, etc.
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # This triggers two separate runs: one Windows, one Mac
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          pip install pypdf pyyaml pyinstaller

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: pyinstaller --onefile --name "PDF_Manager_Win" PDF_rearranger.py

      - name: Build with PyInstaller (Mac)
        if: matrix.os == 'macos-latest'
        run: pyinstaller --onefile --name "PDF_Manager_Mac" PDF_rearranger.py

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PDF_Manager_*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}