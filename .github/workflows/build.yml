name: Build PDF Manager for Win and Mac

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # This triggers two separate runs: one Windows, one Mac
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          pip install pypdf pyyaml pyinstaller

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: pyinstaller --onefile --name "PDF_Manager_Win" PDF_rearranger.py

      - name: Build with PyInstaller (Mac)
        if: matrix.os == 'macos-latest'
        run: pyinstaller --onefile --name "PDF_Manager_Mac" PDF_rearranger.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Manager-${{ matrix.os }}
          path: |
            dist/PDF_Manager_Win.exe
            dist/PDF_Manager_Mac